<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus Timer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center g-4">
            <div class="col-lg-5 col-md-6 text-center">
                <div class="glass-card p-4">
                    <div class="d-flex justify-content-center gap-2 mb-4">
                        <button class="tab-btn active" id="pomodoroTab">Focus</button>
                        <button class="tab-btn" id="shortTab">Short Break</button>
                        <button class="tab-btn" id="longTab">Long Break</button>
                    </div>

                    <div class="svg-container mb-4">
                        <svg viewBox="0 0 100 100">
                            <circle class="circle-track" cx="50" cy="50" r="45"></circle>
                            <circle class="circle-fill" id="progressFill" cx="50" cy="50" r="45"></circle>
                        </svg>
                        <div class="timer-display" id="timeDisplay">25:00</div>
                    </div>

                    <div class="d-flex justify-content-center gap-3">
                        <button class="control-btn" id="playBtn"><i class="fa-solid fa-play"></i></button>
                        <button class="control-btn" id="resetBtn"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>
            </div>

            <div class="col-lg-5 col-md-6">
                <div class="glass-card p-4 h-100">
                    <h5 class="fw-bold mb-3 text-rose"><i class="fa-solid fa-list-check me-2"></i>Task Manager</h5>
                    <form id="todoForm" class="d-flex gap-2 mb-3">
                        <input type="text" id="todoInput" class="form-control" placeholder="What are you working on?" required>
                        <button type="submit" class="btn btn-rose"><i class="fa-solid fa-plus"></i></button>
                    </form>
                    <div class="task-list-box" style="max-height: 250px; overflow-y: auto;">
                        <ul id="todoList" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
